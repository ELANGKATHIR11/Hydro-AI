name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest rasterio geopandas sqlalchemy psycopg2-binary planetary-computer pydantic qdrant-client fastparquet pandas
    - name: Run tests
      run: |
        pytest tests/

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Node dependencies
      run: |
        cd apps/web
        npm install
    - name: Build React app
      run: |
        cd apps/web
        npm run build
